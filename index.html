            <style>
                :root {
                    --primary: #4f46e5;
                    --primary-hover: #4338ca;
                    --bg: #f8fafc;
                    --text: #1e293b;
                }
                body { 
                    font-family: 'Inter', sans-serif; 
                    background-color: var(--bg); 
                    color: var(--text);
                    margin: 0; padding: 40px 5%;
                }
                .header { text-align: center; margin-bottom: 50px; }
                .header h1 { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
                .header p { color: #64748b; font-size: 1.1rem; }
                
                .grid { 
                    display: grid; 
                    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
                    gap: 25px; 
                    max-width: 1200px; margin: 0 auto;
                }
                .card { 
                    background: white; padding: 30px; border-radius: 20px; 
                    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
                    transition: transform 0.2s, box-shadow 0.2s;

                }
                .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
                
                .badge { 
                    background: #eef2ff; color: var(--primary); 
                    font-size: 0.75rem; font-weight: 600; 
                    padding: 4px 12px; border-radius: 9999px; 
                    display: inline-block; margin-bottom: 15px;
                }
                .card h3 { font-size: 1.25rem; margin: 0 0 10px 0; line-height: 1.4; }
                .card p { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; }
                
                .btn { 
                    display: block; text-align: center; 
                    background: var(--primary); color: white; 
                    text-decoration: none; padding: 12px; 
                    border-radius: 12px; font-weight: 600;
                    transition: background 0.2s;
                }
                .btn:hover { background: var(--primary-hover); }
                
                .footer { text-align: center; margin-top: 60px; color: #94a3b8; font-size: 0.9rem; }
                .status-dot { 
                    display: inline-block; width: 8px; height: 8px; 
                    background: #10b981; border-radius: 50%; 
                    margin-right: 5px; box-shadow: 0 0 8px #10b981;
                }
            </style>
        </head>
