<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập</title>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .exam-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
        .btn { padding: 8px 16px; border-radius: 6px; text-decoration: none; background: var(--p); color: white; font-weight: 500; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .badge { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 15px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="stat-card">
            <h1>🎓 Quản Lý Học Tập</h1>
            <h2 id="summary">Đang tải...</h2>
        </div>
        <div id="list"></div>
    </div>
    <script>
        const exams = [{'id': '2', 'name': 'Đề ôn tập số 2', 'file': '2-DTK-HXN-07_conv.html'},
            {'id': '2', 'name': 'Đề ôn tập số 2', 'file': '2-DTK-HXN-05_conv.html'},
            {'id': '2', 'name': 'Đề ôn tập số 2', 'file': '2-DTK-HXN-04_conv.html'},
            {'id': '2', 'name': 'Đề ôn tập số 2', 'file': '2-DTK-HXN-03_conv.html'},
            {'id': '2', 'name': 'Đề ôn tập số 2', 'file': '2-DTK-HXN-01_conv.html'}];
        const listDiv = document.getElementById('list');
        let done = 0;

        exams.forEach(ex => {
            const score = localStorage.getItem('score_' + ex.file.replace('.html',''));
            if(score) done++;
            listDiv.innerHTML += `
                <div class="exam-item">
                    <div>
                        <b>${ex.name}</b><br>
                        ${score ? `<span class="badge">Đã làm: ${score}đ</span>` : '<small style="color: #64748b;">Chưa hoàn thành</small>'}
                    </div>
                    <a href="${ex.file}" class="btn">${score ? 'Làm lại' : 'Bắt đầu'}</a>
                </div>`;
        });
        document.getElementById('summary').innerText = `Hoàn thành: ${done}/${exams.length}`;
    </script>
</body>
</html>
