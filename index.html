
        <!DOCTYPE html>
        <html lang="vi">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hệ thống Đề thi Portal</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
            <style>
                :root {
                    --primary: #4f46e5;
                    --primary-hover: #4338ca;
                    --bg: #f8fafc;
                    --text: #1e293b;
                    --success: #10b981;
                }
                body { 
                    font-family: 'Inter', sans-serif; 
                    background-color: var(--bg); 
                    color: var(--text);
                    margin: 0; padding: 40px 5%;
                }
                .header { text-align: center; margin-bottom: 40px; }
                .header h1 { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
                
                /* Stats Section */
                .stats-container {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                    gap: 20px;
                    max-width: 1200px; margin: 0 auto 40px;
                }
                .stat-card {
                    background: white; padding: 20px; border-radius: 16px;
                    display: flex; align-items: center; gap: 15px;
                    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
                }
                .stat-icon {
                    width: 45px; height: 45px; border-radius: 12px;
                    display: flex; align-items: center; justify-content: center;
                    font-size: 1.2rem;
                }
                .stat-label { color: #64748b; font-size: 0.85rem; font-weight: 600; }
                .stat-value { font-size: 1.5rem; font-weight: 800; color: #1e293b; }

                .grid { 
                    display: grid; 
                    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
                    gap: 25px; 
                    max-width: 1200px; margin: 0 auto;
                }
                .card { 
                    background: white; padding: 25px; border-radius: 20px; 
                    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
                    transition: transform 0.2s;
                    position: relative; border: 1px solid #e2e8f0;
                }
                .card:hover { transform: translateY(-5px); }
                
                .status-badge { 
                    font-size: 0.75rem; font-weight: 600; 
                    padding: 4px 12px; border-radius: 9999px; 
                    display: inline-block; margin-bottom: 15px;
                    background: #f1f5f9; color: #64748b;
                }
                .status-badge.done { background: #d1fae5; color: #065f46; }

                .card h3 { font-size: 1.2rem; margin: 0 0 8px 0; line-height: 1.4; color: #0f172a; }
                .card p { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
                
                .card-footer {
                    display: flex; align-items: center; justify-content: space-between;
                    border-top: 1px solid #f1f5f9; padding-top: 20px;
                }
                .score-label { font-size: 0.9rem; color: #64748b; }
                .score-val { color: var(--success); font-weight: 800; font-size: 1.1rem; }

                .btn { 
                    background: var(--primary); color: white; 
                    text-decoration: none; padding: 10px 20px; 
                    border-radius: 10px; font-weight: 600; font-size: 0.9rem;
                    transition: background 0.2s;
                }
                .btn:hover { background: var(--primary-hover); }
                
                .footer { text-align: center; margin-top: 60px; color: #94a3b8; font-size: 0.85rem; }
                .status-dot { display: inline-block; width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-right: 5px; }
            </style>
        </head>
        <body>
            <div class="header">
                <h1>Hệ thống Đề thi Portal</h1>
                <p>Theo dõi tiến độ và kết quả học tập</p>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-icon" style="background: #eef2ff; color: #4f46e5;">📚</div>
                    <div>
                        <div class="stat-label">Tổng số đề</div>
                        <div class="stat-value" id="total-exams">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #ecfdf5; color: #10b981;">✅</div>
                    <div>
                        <div class="stat-label">Đã hoàn thành</div>
                        <div class="stat-value" id="completed-exams">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #fffbeb; color: #f59e0b;">🏆</div>
                    <div>
                        <div class="stat-label">Điểm trung bình</div>
                        <div class="stat-value" id="avg-score">0.0</div>
                    </div>
                </div>
            </div>

            <div class="grid">
            <div class="card" data-file="2-DTK-HXN-02_conv.html">
                <div class="card-status status-badge">○ Chưa làm</div>
                <h3>Đề ôn tập số 02</h3>
                <p>Nhóm: 2</p>
                <div class="card-footer">
                    <span class="score-label">Kết quả: <b class="score-val">--</b></span>
                    <a href="2-DTK-HXN-02_conv.html" class="btn">Bắt đầu làm bài</a>
                </div>
            </div>
            <div class="card" data-file="2-DTK-HXN-03_conv.html">
                <div class="card-status status-badge">○ Chưa làm</div>
                <h3>Đề ôn tập số 03</h3>
                <p>Nhóm: 2</p>
                <div class="card-footer">
                    <span class="score-label">Kết quả: <b class="score-val">--</b></span>
                    <a href="2-DTK-HXN-03_conv.html" class="btn">Bắt đầu làm bài</a>
                </div>
            </div></div>

            <div class="footer">
                <p><span class="status-dot"></span> Hệ thống đang trực tuyến • Version 5.1</p>
            </div>

            <script>
            document.addEventListener('DOMContentLoaded', function() {
                const history = JSON.parse(localStorage.getItem('exam_history') || '{}');
                const cards = document.querySelectorAll('.card');
                let completed = 0;
                let totalScore = 0;
                let countWithScore = 0;

                cards.forEach(card => {
                    const examFile = card.getAttribute('data-file');
                    const examId = examFile.replace('.html', '');
                    const record = history[examId];
                    
                    const statusBadge = card.querySelector('.status-badge');
                    const scoreVal = card.querySelector('.score-val');
                    const btn = card.querySelector('.btn');

                    if (record) {
                        completed++;
                        statusBadge.textContent = '✔ Đã làm';
                        statusBadge.classList.add('done');
                        scoreVal.textContent = record.score + ' đ';
                        btn.textContent = 'Làm lại';
                        
                        const scoreNum = parseFloat(record.score);
                        if (!isNaN(scoreNum)) {
                            totalScore += scoreNum;
                            countWithScore++;
                        }
                    }
                });

                document.getElementById('total-exams').textContent = cards.length;
                document.getElementById('completed-exams').textContent = completed;
                if (countWithScore > 0) {
                    document.getElementById('avg-score').textContent = (totalScore / countWithScore).toFixed(1);
                }
            });
            </script>
        </body>
        </html>
